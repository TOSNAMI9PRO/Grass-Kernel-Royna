name: Build Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        device: [a51, m31]
        build_type: [aosp, oneui]
        extra_flags: ['--no-ksu', '']
        clang_ver: ['19.1.5', '18.1.8']
    name: "Build for ${{matrix.device}} (${{matrix.build_type}})"
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          fetch-depth: 1
          submodules: recursive
          
      - name: Install WeebX Clang
        run: |
          wget https://github.com/XSans0/WeebX-Clang/releases/download/WeebX-Clang-${{matrix.clang_ver}}-release/WeebX-Clang-${{matrix.clang_ver}}.tar.gz -O "weebx-clang.tar.gz"
          rm -rf toolchain && mkdir toolchain && tar -xvf weebx-clang.tar.gz -C toolchain && rm -rf weebx-clang.tar.gz
          
      - name: Build
        run: python build_kernel.py --${{matrix.build_type}} --target=${{matrix.device}} ${{matrix.extra_flags}}

      - name: Upload Kernel
        if: success()
        uses: actions/upload-artifact@main
        with:
          name: |
            GrassKernel_${{matrix.device}}_${{matrix.build_type}}_Clang${{matrix.clang_ver}}${
              {# conditional logic for extra_flags }
              if matrix.extra_flags == '--no-ksu' then ''
              else if matrix.extra_flags == '' then '(KernelSU)'
              else '(' + matrix.extra_flags + ')'
            }.zip
          path: "Grass*"
          if-no-files-found: error

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@main
        with:
          name: |
            GrassKernel_${{matrix.device}}_${{matrix.build_type}}_Clang${{matrix.clang_ver}}${
              {# conditional logic for extra_flags }
              if matrix.extra_flags == '--no-ksu' then ''
              else if matrix.extra_flags == '' then '(KernelSU)'
              else '(' + matrix.extra_flags + ')'
            }-LOG.zip
          path: "*.log"
          if-no-files-found: warn
