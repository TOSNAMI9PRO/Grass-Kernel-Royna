name: Build Kernel

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        build_type: ['AOSP', 'OneUI']
        device: ['a51', 'm21', 'm31', 'm31s', 'f41', 'm30s', 'gta4xl']
    name: "Build for ${{matrix.device}} (${{matrix.build_type}})"
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          fetch-depth: 0
          submodules: recursive
          
      - name: Install WeebX Clang
        run: |
          wget https://github.com/XSans0/WeebX-Clang/releases/download/WeebX-Clang-18.1.8-release/WeebX-Clang-18.1.8.tar.gz -O "weebx-clang.tar.gz"
          rm -rf toolchain && mkdir toolchain && tar -xvf weebx-clang.tar.gz -C toolchain && rm -rf weebx-clang.tar.gz

      - name: Patch SusFS
        run: |
          # Update v1.4 hooks to v1.6
          curl -Ls https://github.com/sidex15/android_kernel_lge_sm8150/commit/87e6c1fcbd9c007b6a9e34aafdbebc86fd6590f6.patch | patch -p1 -F 3 || true
          # Add compat hooks and other fixes for hooks
          sed -i -e '/static int do_execveat_common/i\\' -e '/^static int compat_do_execve(struct filename \*filename/,/^}/ s/^[[:space:]]*return do_execveat_common(AT_FDCWD, filename, argv, envp, 0);/#ifdef CONFIG_KSU \/\/ 32-bit ksud and 32-on-64 support\n\tksu_handle_execveat((int \*)AT_FDCWD, \&filename, \&argv, \&envp, 0);\n#endif\n\terror = vfs_fstatat(dfd, filename, &stat, flag);/' fs/exec.c
          sed -i '/^SYSCALL_DEFINE4(fstatat64/,/^}/ s/^[[:space:]]*error = vfs_fstatat(dfd, filename, &stat, flag);/#ifdef CONFIG_KSU \/\/ 32-bit su\n\tksu_handle_stat(\&dfd, \&filename, \&flag);\n#endif\n\terror = vfs_fstatat(dfd, filename, &stat, flag);/' fs/stat.c
          sed -i '/ksu_handle_sys_reboot(/ { N; s/\s*ksu_handle_sys_reboot(magic1, magic2, cmd, &arg);\s*\n\s*#endif/\tksu_handle_sys_reboot(magic1, magic2, cmd, \&arg);\n#endif\t/; }' kernel/reboot.c
          # susfs 2.0
          curl -Ls https://github.com/sidex15/android_kernel_lge_sm8150/commit/bb2f164bc19795ef704f17c82f04885d44421418.patch | sed -e 's/static void avc_dump_query(struct audit_buffer \*ab, struct selinux_state \*state,/static void avc_dump_query(struct audit_buffer \*ab, u32 ssid, u32 tsid, u16 tclass)/' -e 's/security_sid_to_context(state, /security_sid_to_context(/' | patch -p1 -F 3
          # increase mnt id
          curl -Ls https://github.com/sidex15/android_kernel_lge_sm8150/commit/1f4ef7d7978c4a74812c2445ebfac02fd451e068.patch | patch -p1 -F 3
          # dehook inline hooks
          curl -Ls https://github.com/sidex15/android_kernel_lge_sm8150/commit/65fb7abff9ce217729b0c4cddf76e76522b636b6.patch | sed '19,42d' | patch -p1 -F 3
          # Apply New SusFS KSUN Patch
          cd KernelSU
          curl -Ls https://github.com/sidex15/KernelSU-Next/commit/7200f73a7b4d0777217ead34fe9322978840df88.patch | patch -p1 -F 3
          cd ./kernel
          git submodule update --init --recursive
          BASE_VERSION=20000
          KSU_VERSION=$(expr $(/usr/bin/git rev-list --count HEAD) "+" $BASE_VERSION)
          echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
          sed -i "s/DKSU_VERSION=16/DKSU_VERSION=${KSU_VERSION}/" Makefile

      - name: Build
        run: |
          BUILD_TYPE_LOWER=$(echo "${{matrix.build_type}}" | tr '[:upper:]' '[:lower:]')
          python build_kernel.py --$BUILD_TYPE_LOWER --target=${{matrix.device}}
          mv GrassKernel_*_*_*.zip "GrassKernel_${{matrix.device}}_${{matrix.build_type}}-KSUN.zip"

      - name: Show Logs
        run: |
          shopt -s nullglob
          for f in *.log; do echo "=== $f ==="; cat "$f"; done

      - name: Upload Kernel
        if: success()
        uses: actions/upload-artifact@main
        with:
          name: GrassKernel_${{matrix.device}}_${{matrix.build_type}}-KSUN
          path: "GrassKernel_${{matrix.device}}_${{matrix.build_type}}-KSUN.zip"
          if-no-files-found: error

      - name: Upload Logs
        if: failure()
        uses: actions/upload-artifact@main
        with:
          name: GrassKernel_${{matrix.device}}_${{matrix.build_type}}-LOG
          path: "*.log"
          if-no-files-found: warn
