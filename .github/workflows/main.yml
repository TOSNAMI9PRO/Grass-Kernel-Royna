name: Build Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        build_type: ['AOSP', 'OneUI']
        device: ['a51', 'm21', 'm31', 'm31s', 'f41', 'm30s']
    name: "Build for ${{matrix.device}} (${{matrix.build_type}})"
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          fetch-depth: 1
          submodules: recursive
          
      - name: Install WeebX Clang
        run: |
          wget https://github.com/XSans0/WeebX-Clang/releases/download/WeebX-Clang-19.1.5-release/WeebX-Clang-19.1.5.tar.gz -O "weebx-clang.tar.gz"
          rm -rf toolchain && mkdir toolchain && tar -xvf weebx-clang.tar.gz -C toolchain && rm -rf weebx-clang.tar.gz
          
      - name: Build
        run: |
          BUILD_TYPE_LOWER=$(echo "${{matrix.build_type}}" | tr '[:upper:]' '[:lower:]')
          python build_kernel.py --$BUILD_TYPE_LOWER --target=${{matrix.device}}
          mv GrassKernel_*_*_*.zip "GrassKernel_${{matrix.device}}_${{matrix.build_type}}.zip"

      - name: Upload Kernel
        if: success()
        uses: actions/upload-artifact@main
        with:
          name: GrassKernel_${{matrix.device}}_${{matrix.build_type}}
          path: "GrassKernel_${{matrix.device}}_${{matrix.build_type}}.zip"
          if-no-files-found: error

      - name: Upload Logs
        if: failure()
        uses: actions/upload-artifact@main
        with:
          name: GrassKernel_${{matrix.device}}_${{matrix.build_type}}-LOG
          path: "*.log"
          if-no-files-found: warn
